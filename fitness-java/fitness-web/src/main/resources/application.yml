server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/fitness?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD}
    mongodb:
      uri: ${MONGODB_FITNESS_URI}
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  type-enums-package: com.fitness.enums
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

jwt:
  secret: ${JWT_SECRET_FITNESS}
  access-token-expire: 30  # minutes
  refresh-token-expire: 7   # days

langchain4j:
  openai:
    chat-model:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY}
      model-name: deepseek-chat
    embedding-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${EMBEDDING_API_KEY}
      model-name: text-embedding-v3
pinecone:
  api-key: ${PINECONE_API_KEY}
  host: ${PINECONE_FITNESS_HOST}
  index-name: ${PINECONE_INDEX:fitness-knowledge}

usda:
  api-key: ${USDA_API_KEY:}
